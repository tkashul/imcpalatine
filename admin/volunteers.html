<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteers - IMC Volunteer Planner</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="admin-layout">

    <!-- Mobile toggle -->
    <button class="sidebar-toggle">=</button>
    <div class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="org-icon">IMC</div>
        <div class="org-name">Immaculate Conception Parish</div>
      </div>
      <div class="sidebar-nav">
        <a href="admin/dashboard.html">
          <span class="nav-icon">#</span> Dashboard
        </a>
        <a href="admin/events.html">
          <span class="nav-icon">@</span> Events
        </a>
        <a href="admin/volunteers.html" class="active">
          <span class="nav-icon">*</span> Volunteers
        </a>
        <div class="nav-divider"></div>
      </div>
      <div class="sidebar-footer">
        <a href="#" onclick="Auth.logout(); return false;">
          <span class="nav-icon">&larr;</span> Sign Out
        </a>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Volunteers</h1>
        <div class="page-actions">
          <button class="btn btn-primary" id="btn-add-volunteer">+ Add Volunteer</button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-wrapper mb-3" style="max-width:400px">
        <span class="search-icon">?</span>
        <input type="text" class="form-input" id="volunteer-search" placeholder="Search by name, email, or phone...">
      </div>

      <div id="volunteers-content"></div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    Admin.initVolunteers();
  </script>
</body>
</html>
